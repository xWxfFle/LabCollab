services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: labcollab
      POSTGRES_PASSWORD: labcollab
      POSTGRES_DB: labcollab
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [CMD-SHELL, pg_isready -U labcollab]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgresql://labcollab:labcollab@postgres:5432/labcollab
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
      INTERNAL_SECRET: ${INTERNAL_SECRET:-internal-dev-secret}
      CORS_ORIGIN: http://localhost:8080
      UPLOAD_DIR: /app/data/uploads
    volumes:
      - uploads_data:/app/data/uploads
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - '8080:80'
    depends_on:
      - api

volumes:
  postgres_data:
  uploads_data:
